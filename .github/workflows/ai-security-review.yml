name: AI Security Review

# pull_request_target roda no contexto do repo BASE (não do fork):
# secrets e permissão de comentar ficam disponíveis em PRs de fork.
# Seguro aqui porque só geramos o diff do PR — não executamos código do fork.
on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ai-security-review:
    name: AI security review
    runs-on: ubuntu-latest
    env:
      MIN_SECURITY_SCORE: "7"
      OPENAI_MODEL: gpt-4o-mini
      BYPASS_AUTHOR: marlonhenq
      BYPASS_LABEL: ai-security-bypass
      BYPASS_COMMAND: /ai-bypass
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Verificar bypass (/ai-bypass por marlonhenq)
        id: bypass
        uses: actions/github-script@v7
        with:
          script: |
            const author = process.env.BYPASS_AUTHOR;
            const label = process.env.BYPASS_LABEL;
            const command = process.env.BYPASS_COMMAND;
            const pr = context.payload.pull_request;
            const labels = (pr.labels || []).map(l => l.name);
            const hasLabel = labels.includes(label);

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });
            const hasCommand = comments.some(
              c => c.user.login === author && c.body.includes(command)
            );

            const active = hasLabel && hasCommand;
            core.setOutput('active', active ? 'true' : 'false');
            if (active) {
              core.info(`Bypass ativo: label ${label} + ${command} de @${author}`);
            } else if (hasLabel && !hasCommand) {
              core.warning(`Label ${label} sem ${command} de @${author} — bypass ignorado.`);
            }

      - name: Gerar diff do PR
        if: steps.bypass.outputs.active != 'true'
        run: |
          set -euo pipefail
          git fetch origin "pull/${{ github.event.pull_request.number }}/head:pr-head"
          git diff "${{ github.event.pull_request.base.sha }}...pr-head" > pr.diff
          echo "Linhas no diff: $(wc -l < pr.diff)"

      # PRs do mesmo repo podem usar script atualizado do head (bootstrap de mudanças no CI).
      - name: Usar script de review do PR (mesmo repo)
        if: >-
          steps.bypass.outputs.active != 'true' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: |
          set -euo pipefail
          if git diff --name-only "${{ github.event.pull_request.base.sha }}...pr-head" \
            | grep -qx 'scripts/ci/ai_security_review.py'; then
            git show pr-head:scripts/ci/ai_security_review.py > scripts/ci/ai_security_review.py
            echo "Usando ai_security_review.py do head do PR."
          fi

      - name: Avaliar segurança (OpenAI)
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DIFF_PATH: pr.diff
          REVIEW_OUTPUT: review.json
          REPO_ROOT: ${{ github.workspace }}
          AI_SECURITY_BYPASS: ${{ steps.bypass.outputs.active }}
        run: python3 scripts/ci/ai_security_review.py

      - name: Comentar resultado no PR
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          MIN_SECURITY_SCORE: ${{ env.MIN_SECURITY_SCORE }}
        with:
          script: |
            const fs = require('fs');
            const minScore = Number(process.env.MIN_SECURITY_SCORE || '7');
            let data = { status: 'skipped', passed: true, score: null, summary: '', findings: [] };
            try {
              data = JSON.parse(fs.readFileSync('review.json', 'utf8'));
            } catch {
              data.summary = 'Arquivo de resultado ausente.';
            }
            const bypassed = data.status === 'bypassed' || data.bypassed === true;
            const skipped = data.status === 'skipped' || data.skipped === true;
            const passed = bypassed || skipped ? true : data.passed === true;
            const score = data.score != null ? data.score : '—';
            let body = `## Avaliação de segurança (IA)\n\n`;
            body += `| | |\n|---|---|\n`;
            body += `| **Nota** | **${score}**/10 |\n`;
            body += `| **Mínimo** | ${minScore} |\n`;
            if (bypassed) {
              body += `| **Resultado** | ⏭️ Bypass (@marlonhenq) |\n\n`;
              body += `${data.summary || data.bypass_reason || 'Bypass autorizado.'}\n\n`;
            } else if (skipped) {
              body += `| **Resultado** | ⚠️ Não executada (PR liberado) |\n\n`;
              body += `${data.summary || data.skip_reason || 'API/chave indisponível.'}\n\n`;
            } else {
              body += `| **Resultado** | ${passed ? '✅ Aprovado' : '❌ Reprovado'} |\n\n`;
              if (data.retry_used && data.first_score != null) {
                body += `> **Segunda análise:** 1ª tentativa **${data.first_score}**/10 → 2ª **${score}**/10 (com contexto do repositório)\n\n`;
              }
              if (data.summary) body += `${data.summary}\n\n`;
            }
            const findings = data.findings || [];
            if (findings.length) {
              body += `### Achados\n\n`;
              for (const f of findings) {
                body += `- **${(f.severity || 'info').toUpperCase()}** — ${f.title}: ${f.detail}\n`;
              }
            }
            body += `\n---\n_Modelo: \`${{ env.OPENAI_MODEL }}\` · Secret: \`OPENAI_API_KEY\`_`;
            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } catch (err) {
              const msg = err?.message || String(err);
              if (msg.includes('Resource not accessible by integration')) {
                core.warning(
                  'Sem permissão para comentar. Resultado está no summary do workflow.'
                );
              } else {
                throw err;
              }
            }

      - name: Falhar apenas se nota < mínimo (avaliação concluída)
        if: steps.review.outcome == 'failure'
        run: |
          echo "::error::Nota de segurança abaixo de ${MIN_SECURITY_SCORE}/10 (após 2ª análise com contexto)."
          exit 1
