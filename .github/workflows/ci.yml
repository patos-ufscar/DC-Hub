name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  php-syntax:
    name: PHP syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Lint PHP files
        run: |
          set -e
          find app public cron scripts -name '*.php' -print0 | xargs -0 -n1 php -l
